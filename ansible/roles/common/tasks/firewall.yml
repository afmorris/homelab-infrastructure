---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: Enable UFW with default deny-incoming policy
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: true

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  become: true
