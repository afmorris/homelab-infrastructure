---
- name: apply sysctl settings
  ansible.builtin.command: sysctl --system
  become: true

- name: restart systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
  become: true

- name: restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  become: true
