---
# ---------------------------------------------------------------
# User
# ---------------------------------------------------------------

- name: Create exportarr group
  ansible.builtin.group:
    name: "{{ exportarr_group }}"
    system: true

- name: Create exportarr user
  ansible.builtin.user:
    name: "{{ exportarr_user }}"
    group: "{{ exportarr_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

# ---------------------------------------------------------------
# Installation — guarded so re-runs don't re-download
# ---------------------------------------------------------------

- name: Check if exportarr is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/exportarr
  register: exportarr_installed

- name: Download exportarr
  ansible.builtin.get_url:
    url: "https://github.com/onedr0p/exportarr/releases/download/v{{ exportarr_version }}/exportarr_{{ exportarr_version }}_linux_amd64.tar.gz"
    dest: /tmp/exportarr.tar.gz
    mode: '0644'
  when: not exportarr_installed.stat.exists

- name: Create exportarr extract directory
  ansible.builtin.file:
    path: /tmp/exportarr_extract
    state: directory
    mode: '0755'
  when: not exportarr_installed.stat.exists

- name: Extract exportarr
  ansible.builtin.unarchive:
    src: /tmp/exportarr.tar.gz
    dest: /tmp/exportarr_extract
    remote_src: true
  when: not exportarr_installed.stat.exists

- name: Find exportarr binary in extract directory
  ansible.builtin.find:
    paths: /tmp/exportarr_extract
    patterns: "exportarr"
    file_type: file
    recurse: true
  register: exportarr_binary
  when: not exportarr_installed.stat.exists

- name: Install exportarr binary
  ansible.builtin.copy:
    src: "{{ exportarr_binary.files[0].path }}"
    dest: /usr/local/bin/exportarr
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  when: not exportarr_installed.stat.exists

- name: Remove exportarr archive and extract directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/exportarr.tar.gz
    - /tmp/exportarr_extract
  when: not exportarr_installed.stat.exists

# ---------------------------------------------------------------
# Systemd service
# ---------------------------------------------------------------

- name: Deploy exportarr systemd service
  ansible.builtin.template:
    src: exportarr.service.j2
    dest: "/etc/systemd/system/exportarr-{{ exportarr_mode }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: restart exportarr

- name: Enable and start exportarr
  ansible.builtin.systemd:
    name: "exportarr-{{ exportarr_mode }}"
    enabled: true
    state: started
    daemon_reload: true

# ---------------------------------------------------------------
# Firewall
# ---------------------------------------------------------------

- name: Allow exportarr port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ exportarr_port }}"
    proto: tcp
