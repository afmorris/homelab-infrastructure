---
- name: Check if Huntarr is already installed
  ansible.builtin.stat:
    path: "{{ huntarr_install_dir }}"
  become: true
  register: huntarr_installed

- name: Install Huntarr dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - git
    state: present
  become: true

- name: Clone Huntarr repository
  ansible.builtin.git:
    repo: "{{ huntarr_repo_url }}"
    dest: "{{ huntarr_install_dir }}"
    version: main
  become: true
  when: not huntarr_installed.stat.exists

- name: Install Huntarr Python dependencies
  ansible.builtin.pip:
    requirements: "{{ huntarr_install_dir }}/requirements.txt"
    executable: pip3
  become: true
  when: not huntarr_installed.stat.exists

- name: Set ownership on Huntarr install directory
  ansible.builtin.file:
    path: "{{ huntarr_install_dir }}"
    state: directory
    owner: "{{ huntarr_user }}"
    group: "{{ huntarr_group }}"
    mode: '0755'
    recurse: true
  become: true

- name: Create Huntarr config directory
  ansible.builtin.file:
    path: "{{ huntarr_config_dir }}"
    state: directory
    owner: "{{ huntarr_user }}"
    group: "{{ huntarr_group }}"
    mode: '0755'
  become: true

- name: Deploy Huntarr systemd service
  ansible.builtin.template:
    src: huntarr.service.j2
    dest: /etc/systemd/system/huntarr.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: restart huntarr

- name: Enable and start Huntarr service
  ansible.builtin.systemd:
    name: huntarr
    enabled: true
    state: started
  become: true

- name: Allow Huntarr port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ huntarr_port | string }}"
    proto: tcp
  become: true
