---
# ---------------------------------------------------------------
# User and directories
# ---------------------------------------------------------------

- name: Create prometheus group
  ansible.builtin.group:
    name: "{{ prometheus_group }}"
    system: true

- name: Create prometheus user
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Create prometheus config directory
  ansible.builtin.file:
    path: "{{ prometheus_config_dir }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'

- name: Create prometheus data directory
  ansible.builtin.file:
    path: "{{ prometheus_data_dir }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'

# ---------------------------------------------------------------
# Installation — guarded so re-runs don't re-download
# ---------------------------------------------------------------

- name: Check if prometheus is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/prometheus
  register: prometheus_installed

- name: Download prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: '0644'
  when: not prometheus_installed.stat.exists

- name: Extract prometheus
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: true
  when: not prometheus_installed.stat.exists

- name: Install prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: /usr/local/bin/{{ item }}
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  loop:
    - prometheus
    - promtool
  when: not prometheus_installed.stat.exists

- name: Remove prometheus archive
  ansible.builtin.file:
    path: /tmp/prometheus.tar.gz
    state: absent
  when: not prometheus_installed.stat.exists

# ---------------------------------------------------------------
# Configuration
# ---------------------------------------------------------------

- name: Deploy prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0644'
    validate: /usr/local/bin/promtool check config %s
  notify: restart prometheus

# ---------------------------------------------------------------
# Systemd service
# ---------------------------------------------------------------

- name: Deploy prometheus systemd service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: '0644'
  notify: restart prometheus

- name: Enable and start prometheus
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
    daemon_reload: true

# ---------------------------------------------------------------
# Firewall
# ---------------------------------------------------------------

- name: Allow Prometheus port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ prometheus_web_listen_address.split(':')[1] }}"
    proto: tcp
