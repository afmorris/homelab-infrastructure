---
# Master playbook - deploy entire homelab infrastructure

- name: Configure storage (TrueNAS users, dataset ownership, NFS shares)
  hosts: storage
  become: false
  roles:
    - truenas

- name: Apply common tasks to all hosts
  hosts: all,!storage
  roles:
    - common

- name: Configure docker hosts
  hosts: container_hosts
  roles:
    - docker
    - monitoring_client

- name: Configure media services
  hosts: media
  roles:
    - monitoring_client

- name: Configure databases
  hosts: databases
  roles:
    - mssql
    - monitoring_client

- name: Deploy Plex
  hosts: svp01plex01
  roles:
    - plex

- name: Deploy Sonarr
  hosts: svp01sonarr01
  roles:
    - sonarr

- name: Deploy Radarr
  hosts: svp01radarr01
  roles:
    - radarr

- name: Deploy SABnzbd
  hosts: svp01sabnzbd01
  roles:
    - sabnzbd

- name: Deploy Huntarr
  hosts: svp01huntarr01
  roles:
    - huntarr

- name: Configure monitoring stack
  hosts: monitoring
  roles:
    - monitoring_client
