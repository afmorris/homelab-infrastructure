---
all:
  vars:
    ansible_user: tony
    ansible_python_interpreter: /usr/bin/python3

  children:
    # Storage (managed via TrueNAS API — connection: local, no SSH)
    storage:
      hosts:
        truenas:
          ansible_host: truenas
          ansible_connection: local

    # Media services
    media:
      hosts:
        svp01plex01:
          ansible_host: svp01plex01
        svp01sonarr01:
          ansible_host: svp01sonarr01
        svp01radarr01:
          ansible_host: svp01radarr01
        svp01sabnzbd01:
          ansible_host: svp01sabnzbd01
        svp01huntarr01:
          ansible_host: svp01huntarr01

    # Database services
    databases:
      hosts:
        svp01sql01:
          ansible_host: svp01sql01

    # Containerized services
    container_hosts:
      hosts:
        svp01docker01:
          ansible_host: svp01docker01

    # Monitoring (for future prometheus/grafana)
